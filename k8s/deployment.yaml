apiVersion: apps/v1
kind: Deployment

metadata:
  name: project-1-deployment
  labels:
    app: project-1

spec:
  replicas: 2

  selector:
    matchLabels:
      app: project-1

  template:
    metadata:
      labels:
        app: project-1

    spec:
      containers:
      - name: project-1-container

        image: nginx:latest

        ports:
        - containerPort: 80

